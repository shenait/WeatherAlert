
services:
  # PHP Backend API
  - type: web
    name: weatheralert-api
    runtime: php
    plan: free
    region: oregon
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: chmod +x start.sh && ./start.sh
    healthCheckPath: /test.php
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: weatheralert-db
          property: connectionString
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
    autoDeploy: true

  # React Frontend
  - type: web
    name: weatheralert-frontend
    runtime: static
    plan: free
    region: oregon
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        sync: false
    autoDeploy: true

databases:
  - name: weatheralert-db
    databaseName: weatheralert_db
    user: weatheralert_user
    plan: free
    region: oregon