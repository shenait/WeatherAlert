version: '3.8'

services:
  # PHP Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: weatheralert-backend
    ports:
      - "8080:80"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - .:/var/www/html
    networks:
      - weatheralert-network

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: weatheralert-db
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASS}
      - MYSQL_DATABASE=${DB_NAME}
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - weatheralert-network

volumes:
  db-data:

networks:
  weatheralert-network:
    driver: bridge